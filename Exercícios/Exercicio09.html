<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 09 - CSS</title>
    <link rel="stylesheet" href="../Styles/Exercicio09.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<style>
    * {
        margin: 0px;
        padding: 0px;
    }

    .menu {
        background-color: rgb(210, 229, 210);
        height:100px;
    }

    .logo {
        float: left;
        text-indent: 20px;
        padding:5px;
    }

    .menu ul {
        float: left;
        width: 50%;
        margin-right: 20px;
        line-height: 100px;
        text-align: center;
    }

    .menu ul li {
        text-decoration: none;
        display: inline;
        padding: 20px;
        font-family: 'Finger Paint', cursive;
        font-size: 1.5em;
        cursor: pointer;
        color: rgb(22, 44, 7);
        transition: 0.2s ease;
    }
    
    .menu ul li:hover{
        color: rgb(110, 231, 110);
    }

    .pesquisa {
        width: 20%;
        height: 30px;
        font-size: 18px;
        margin-bottom: 10px;
        background-color: #ffffff;
        border: solid rgb(1, 1, 1) 1.5px;
        border-radius: 10px;
        background-image: url();
        background-size: 10%;
        background-repeat: no-repeat;
        background-position: top 5px right 10px;
        margin-top: -65px;
        margin-right: 20px;
        float: right;
    }

    .clear{
        clear:both;
    }
</style>

<body>
    <div class="menu">
        <div class="logo"><img src="../IMG/logoipsum.png" width="20%"></div>
        <ul>
            <li>Home</li>
            <li>Serviços</li>
            <li>Produtos</li>
            <li>Sobre</li>
        </ul>
        <div class="box-pesquisa"><input class="pesquisa" type="text" name="pesquisa" placeholder=" Pesquisar">
        </div>
    </div>
    <div class="clear"></div>
    <div>
        <span>NATUREZA É REAL</span>
    </div>
    <div>
        <span>NATUREZA É VIDA</span>
    </div>
    <div>a</div>
    <div></div>
</body>

</html>
