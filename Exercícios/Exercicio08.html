<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 08 - CSS</title>
</head>
<body>
    <div class="cima">Cima</div>
    <div class="esquerda">Esquerda</div>
    <div class="meio">Meio</div>
    <div class="direita">Direita</div>
    <div class="clear"></div>
    <div class="baixo">Baixo</div>
</body>
</html>
<style>
    *{
        margin:0%;
        padding:0%;
    }

    .cima{
        background-color:rgb(65, 166, 255);
        padding: 30px;
    }

    .esquerda{
        background-color: green;
        color: white;
        height: 60vh;
        width: 27%;
        margin: 2%;
        padding: 1%;
        float: left;
    }

    .meio{
        background-color: yellow;
        height: 60vh;
        width: 27%;
        margin: 2%;
        padding: 1%;
        float: left;
    }

    .direita{
        background-color: rgb(230, 0, 255);
        color: white;
        height: 60vh;
        width: 27%;
        margin: 2%;
        padding: 1%;
        float: left;
    }
    
    .clear{
        clear:both;
    }

    .baixo{
        margin-bottom: 0px;
        background-color:rgb(153, 54, 51);
        padding: 30px;
        color: white;
        height: 60px;
    }
</style>
