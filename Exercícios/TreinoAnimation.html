<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    @keyframes animacao {
        from {
            background-color: aqua;
            border-radius: 50%;
            top: 0px;
            left: 0px;
        }

        to {
            background-color: blue;
            top: 200px;
            left: 200px;
        }
    }

    .box {
        top: 200px;
        left: 200px;
        background-color: blue;
        width: 300px;
        height: 300px;
        animation-name: animacao;
        animation-duration: 2s;
        animation-iteration-count: 1;
        animation-direction: alternate-reverse;
        position: absolute;
    }
</style>

<body>
    <div>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Obcaecati eligendi, placeat voluptatum eveniet dignissimos asperiores non amet qui excepturi iste saepe quam, error illum repellendus velit enim. Corporis, culpa dignissimos.</div>
    <div class="box"></div>
</body>

</html>
